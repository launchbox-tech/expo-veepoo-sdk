name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache Bun install cache
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build

      - name: Verify Veepoo events bridge contract
        run: node build/bridge-contract/cli-check-veepoo-events.js

      - name: Verify native rejection bridge contract
        run: node build/bridge-contract/cli-check-native-rejection.js

      - name: Verify vendor manifest
        run: bun run vendor:check

      - name: Compute SDK snapshot cache keys
        id: sdk-keys
        run: |
          echo "android=$(node -e "const m=require('./vendor-manifest.json'); process.stdout.write(m.upstreamReference.androidBleSdk.lastReviewedHeadSha)")" >> $GITHUB_OUTPUT
          echo "ios=$(node -e "const m=require('./vendor-manifest.json'); process.stdout.write(m.upstreamReference.iosBleSdk.lastReviewedHeadSha)")" >> $GITHUB_OUTPUT

      - name: Cache Android SDK snapshot
        uses: actions/cache@v5
        with:
          path: vendor-sdk-snapshots/android/
          key: android-sdk-${{ steps.sdk-keys.outputs.android }}

      - name: Cache iOS SDK snapshot
        uses: actions/cache@v5
        with:
          path: vendor-sdk-snapshots/ios/
          key: ios-sdk-${{ steps.sdk-keys.outputs.ios }}

      - name: Fetch SDK snapshots
        run: bash scripts/fetch-sdk-snapshots.sh

      - name: Verify upstream SDK coverage
        run: node build/bridge-contract/cli-check-upstream-sdk.js

      - name: Test with coverage
        run: bun run test:coverage
        env:
          CI: true

      - name: Upload coverage report
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: coverage
          path: coverage/
          if-no-files-found: ignore
